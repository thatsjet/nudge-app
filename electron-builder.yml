appId: com.nudge.app
productName: Nudge
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
extraResources:
  - default-vault/**
  - app-bundle/**
icon: icon.png
mac:
  target:
    - dmg
    - dir
  category: public.app-category.productivity
  icon: icon.png
win:
  target: nsis
  icon: icon.png
  azureSignOptions:
    publisherName: "Jeremy Anderson"
    endpoint: "https://wus.codesigning.azure.net/"
    certificateProfileName: "nudge-public-trust"
    codeSigningAccountName: "nudgesigning"
linux:
  target: AppImage
afterAllArtifactBuild: scripts/fix-update-yml.js
publish:
  provider: github
  owner: thatsjet
  repo: nudge-app
